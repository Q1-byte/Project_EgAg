spring:
  application:
    name: egag

  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/egag?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

          kakao:
            # 팀원들에게 각자 카카오 디벨로퍼에서 받은 REST API 키를 넣으라고 안내하세요.
            client-id: ${KAKAO_CLIENT_ID:YOUR_REST_API_KEY_HERE}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id


# JWT
jwt:
  secret: ${JWT_SECRET:ZWdhZy1kZXYtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLWhzMjU2}
  access-expiration: 900000      # 15분 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# OpenAI
openai:
  api-key: ${OPENAI_API_KEY:}

# Kakao OAuth
kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}

# KakaoPay (결제)
kakaopay:
  secret-key: ${KAKAOPAY_SECRET_KEY:}
  cid: ${KAKAOPAY_CID:TC0ONETIME}

# TossPay (결제)
tosspay:
  secret-key: ${TOSS_SECRET_KEY:}

# Portone (결제)
portone:
  api-key: ${PORTONE_API_KEY:}
  api-secret: ${PORTONE_API_SECRET:}

# Resend (이메일 발송)
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:noreply@yourdomain.com}

# 앱 설정
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}

server:
  port: 8080



