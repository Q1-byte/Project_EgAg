spring:
  application:
    name: egag

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/egag?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

# JWT
jwt:
  secret: ${JWT_SECRET:egag-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-expiration: 900000      # 15분 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# LangChain4j + OpenAI
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:demo}
      model-name: gpt-4o
      max-tokens: 1000
      log-requests: true
      log-responses: true

server:
  port: 8080
