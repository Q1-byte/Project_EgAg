<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 270">

  <!-- Chick body oval (yellow) -->
  <ellipse cx="100" cy="213" rx="52" ry="68" fill="#FFD700" stroke="#000000" stroke-width="3"/>

  <!-- Left eye -->
  <circle cx="83" cy="151" r="8" fill="#000000"/>
  <circle cx="85.5" cy="148.5" r="2.5" fill="#FFFFFF"/>

  <!-- Right eye -->
  <circle cx="117" cy="151" r="8" fill="#000000"/>
  <circle cx="119.5" cy="148.5" r="2.5" fill="#FFFFFF"/>

  <!-- Beak (slightly rounded downward triangle) -->
  <path d="M 93,161 L 107,161 L 100,172 Z" fill="#FFA500" stroke="#000000" stroke-width="2" stroke-linejoin="round"/>

  <!-- Left cheek blush -->
  <ellipse cx="72" cy="160" rx="8" ry="5.5" fill="#FFC0CB"/>

  <!-- Right cheek blush -->
  <ellipse cx="128" cy="160" rx="8" ry="5.5" fill="#FFC0CB"/>

  <!-- Egg cup bottom (cream, covers lower chick body) -->
  <path d="M 30,187 L 48,170 L 65,187 L 83,170 L 100,187 L 117,170 L 135,187 L 152,170 L 170,187
           C 175,222 170,255 100,258
           C 30,255 25,222 30,187 Z"
        fill="#FFEDDC" stroke="#000000" stroke-width="3.5" stroke-linejoin="miter"/>

  <!-- Egg lid dome (resting on chick's head) -->
  <path d="M 30,153 L 48,136 L 65,153 L 83,136 L 100,153 L 117,136 L 135,153 L 152,136 L 170,153
           C 165,96 150,52 100,40
           C 50,52 35,96 30,153 Z"
        fill="#FFEDDC" stroke="#000000" stroke-width="3.5" stroke-linejoin="miter"/>

  <!-- Lid highlight (white ellipse, upper-left area) -->
  <ellipse cx="76" cy="82" rx="10" ry="20" fill="#FFFFFF" opacity="0.4" transform="rotate(-25, 76, 82)"/>

</svg>
